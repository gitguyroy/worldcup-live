<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<div class="max-w-4xl mx-auto px-4">

  <h1 class="text-center text-3xl font-bold text-yellow-400 py-6">
    🏆 FIFA World Cup 2026 - Live Streaming
  </h1>

  <div class="bg-gray-900 rounded-xl overflow-hidden shadow-lg mb-8">
    <video id="player" controls playsinline
      class="w-full aspect-video bg-black">
    </video>
    <div class="p-4">
      <p id="now-playing" class="text-yellow-400 font-semibold text-lg">
        🎬 Click any match below to watch
      </p>
    </div>
  </div>

  <h2 class="text-xl font-bold text-white mb-4">📅 Today's Matches</h2>
  <div id="matches" class="grid gap-4">

    <div onclick="playStream('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'Brazil vs Argentina')"
      class="bg-gray-800 hover:bg-yellow-500 hover:text-black cursor-pointer rounded-xl p-4 flex justify-between items-center transition-all duration-300">
      <div>
        <p class="font-bold text-lg">🇧🇷 Brazil vs Argentina 🇦🇷</p>
        <p class="text-sm text-gray-400">Group Stage • 9:30 PM IST</p>
      </div>
      <span class="bg-red-500 text-white text-xs px-3 py-1 rounded-full animate-pulse">● LIVE</span>
    </div>

    <div onclick="playStream('https://devstreaming-cdn.apple.com/videos/streaming/examples/img_bipbop_adv_example_fmp4/master.m3u8', 'France vs Germany')"
      class="bg-gray-800 hover:bg-yellow-500 hover:text-black cursor-pointer rounded-xl p-4 flex justify-between items-center transition-all duration-300">
      <div>
        <p class="font-bold text-lg">🇫🇷 France vs Germany 🇩🇪</p>
        <p class="text-sm text-gray-400">Group Stage • 12:30 AM IST</p>
      </div>
      <span class="bg-green-500 text-white text-xs px-3 py-1 rounded-full">⏰ Upcoming</span>
    </div>

    <div onclick="playStream('https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8', 'Spain vs Portugal')"
      class="bg-gray-800 hover:bg-yellow-500 hover:text-black cursor-pointer rounded-xl p-4 flex justify-between items-center transition-all duration-300">
      <div>
        <p class="font-bold text-lg">🇪🇸 Spain vs Portugal 🇵🇹</p>
        <p class="text-sm text-gray-400">Group Stage • 3:30 AM IST</p>
      </div>
      <span class="bg-green-500 text-white text-xs px-3 py-1 rounded-full">⏰ Upcoming</span>
    </div>

  </div>
</div>

<script>
function playStream(url, matchName) {
  const video = document.getElementById('player');
  const nowPlaying = document.getElementById('now-playing');

  nowPlaying.textContent = '▶️ Now Playing: ' + matchName;

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function () {
      video.play();
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url;
    video.play();
  }
}
</script>
